<!DOCTYPE html>
<html>
<head>
    <title>Moje gry</title>
    <style>
        body {
            font-family: Arial;
            background: #1e1e2f;
            color: white;
            text-align: center;
        }

        .game {
            background: #2f2f4f;
            margin: 10px auto;
            padding: 15px;
            width: 400px;
            border-radius: 10px;
        }

        a {
            color: #ff4757;
            text-decoration: none;
        }

        form {
            margin: 10px;
        }

        input, select, button {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h1>📚 Moje gry</h1>

    <a href="/">⬅️ Wróć</a>

    <!-- 🔍 FILTROWANIE + SORTOWANIE -->
    <form method="GET">
        <input type="text" name="search" placeholder="Szukaj gry..." 
               value="{{ request.args.get('search', '') }}">

        <select name="sort">
            <option value="rating" {% if request.args.get('sort') == 'rating' %}selected{% endif %}>Rating</option>
            <option value="name" {% if request.args.get('sort') == 'name' %}selected{% endif %}>Nazwa</option>
            <option value="date" {% if request.args.get('sort') == 'date' %}selected{% endif %}>Data</option>
        </select>

        <select name="order">
            <option value="desc" {% if request.args.get('order') == 'desc' %}selected{% endif %}>Malejąco ↓</option>
            <option value="asc" {% if request.args.get('order') == 'asc' %}selected{% endif %}>Rosnąco ↑</option>
        </select>

        <button type="submit">Zastosuj</button>
    </form>

    <hr>

    {% if games %}
        {% for game in games %}
            <div class="game">
                <h3>{{ game.name }}</h3>

                {% if game.rating %}
                    <p>⭐ Rating: {{ game.rating }}</p>
                {% endif %}

                {% if game.release_date %}
                    <p>📅 Data: {{ game.release_date }}</p>
                {% endif %}

                <form action="/delete-game/{{ game.id }}" method="POST" 
                      onsubmit="return confirm('Na pewno usunąć?')">
                    <button type="submit">❌ Usuń</button>
                </form>
            </div>
        {% endfor %}
    {% else %}
        <p>Brak zapisanych gier 😢</p>
    {% endif %}

</body>
</html>
