<body>

    <h1>🎮 Game Explorer</h1>

    <form method="GET">
    <input type="text" name="name" placeholder="Wpisz nazwę gry..." 
           value="{{ request.args.get('name', '') }}">

    <select name="sort">
        <option value="rating" {% if request.args.get('sort', 'rating') == 'rating' %}selected{% endif %}>Rating</option>
        <option value="name" {% if request.args.get('sort') == 'name' %}selected{% endif %}>Nazwa</option>
        <option value="date" {% if request.args.get('sort') == 'date' %}selected{% endif %}>Data</option>
    </select>

    <select name="order">
        <option value="desc" {% if request.args.get('order', 'desc') == 'desc' %}selected{% endif %}>Malejąco ↓</option>
        <option value="asc" {% if request.args.get('order') == 'asc' %}selected{% endif %}>Rosnąco ↑</option>
    </select>

    <button type="submit">Szukaj</button>
    </form>
    
    <!-- 🎮 WYNIKI -->
    {% for game in games %}
        <div class="game">
            <h3>{{ game.name }}</h3>
            
            {% if game.cover %}
                <img src="https:{{ game.cover.url.replace('t_thumb', 't_cover_big') }}" width="200">
            {% endif %}

            {% if game.rating %}
                <p>⭐ Rating: {{ game.rating|round(1) }}</p>
            {% endif %}

            {% if game.first_release_date %}
                <p>📅 Data: {{ game.first_release_date }}</p>
            {% endif %}

            <form action="/add-game" method="POST">
                <input type="hidden" name="igdb_id" value="{{ game.id }}">
                <input type="hidden" name="name" value="{{ game.name }}">
                <input type="hidden" name="rating" value="{{ game.rating }}">
                <input type="hidden" name="release_date" value="{{ game.first_release_date }}">

                <button type="submit">💾 Dodaj do bazy</button>
            </form>
        </div>
    {% endfor %}

</body>
